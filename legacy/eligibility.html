/* Animated underline for nav links */
.animated-underline {
  position: relative;
  overflow: hidden;
}
.animated-underline::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  height: 2px;
  width: 100%;
  background: linear-gradient(90deg, #4e4d4d 0%, #1b1917 100%);

  transform-origin: left;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
}
.animated-underline:hover::after,
.animated-underline:focus::after {
  transform: scaleX(1);
  transform-origin: left;
}

<!-- Eligibility Check Box -->
<div class="container mx-auto max-w-4xl px-4 mb-1">
  <div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col gap-6 border border-emerald-200">
    <h2 class="text-2xl font-bold text-emerald-700 mb-2 flex items-center gap-2">
      <i class="fas fa-user-check"></i> Check Your Eligibility
    </h2>
    <form id="eligibilityForm" class="space-y-4">
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="name">Your Name</label>
        <input type="text" id="name" required placeholder="Enter your name" minlength="3" maxlength="20"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition" />
      </div>
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="country">Your Country</label>
        <select id="country" required
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition">
          <option value="">Select your country</option>
          <!-- Country options will be populated by JS -->
        </select>
      </div>
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="education">Educational Level</label>
        <select id="education" required
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition">
          <option value="">Select level</option>
          <option value="intermediate">Intermediate</option>
          <option value="bachelor">Bachelor</option>
          <option value="master">Master</option>
          <option value="phd">PhD</option>
        </select>
      </div>
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="percentage">Percentage in Last Degree</label>
        <input type="number" id="percentage" min="0" max="100" required placeholder="e.g. 85"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition" />
      </div>
      <div>
        <label class="block text-gray-700 font-semibold mb-1" for="age">Age</label>
        <input type="number" id="age" min="15" max="30" required placeholder="Enter your age"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition" />
      </div>
      <button type="submit"
        class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-lg text-lg shadow transition">
        <i class="fas fa-search mr-2"></i>Check Eligibility
      </button>
    </form>
    <div id="eligibilityResult" class="mt-2 text-center text-lg font-semibold"></div>
  </div>
</div>

<script>
// Populate country dropdown with all countries
const countries = [
  "Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia","Australia","Austria",
  "Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia",
  "Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia",
  "Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo (Congo-Brazzaville)",
  "Costa Rica","Croatia","Cuba","Cyprus","Czechia","Democratic Republic of the Congo","Denmark","Djibouti","Dominica",
  "Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia",
  "Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea",
  "Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland",
  "Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon",
  "Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives",
  "Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia",
  "Montenegro","Morocco","Mozambique","Myanmar (Burma)","Namibia","Nauru","Nepal","Netherlands","New Zealand",
  "Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine State",
  "Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda",
  "Saint Kitts and Nevis","Saint Lucia","Saint Vincent and the Grenadines","Samoa","San Marino","Sao Tome and Principe",
  "Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands",
  "Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland",
  "Syria","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia","Turkey",
  "Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay",
  "Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
];
const countrySelect = document.getElementById('country');
countries.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c;
  opt.textContent = c;
  countrySelect.appendChild(opt);
});

// Eligibility logic as per your requirements
document.getElementById('eligibilityForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const country = document.getElementById('country').value;
  const education = document.getElementById('education').value;
  const percentage = parseFloat(document.getElementById('percentage').value);
  const age = parseInt(document.getElementById('age').value, 10);

  const resultBox = document.getElementById('eligibilityResult');
  // Show loading spinner
  resultBox.innerHTML = `
    <div class="flex flex-col items-center justify-center py-6">
      <i class="fas fa-spinner fa-spin text-4xl text-emerald-700 mb-2"></i>
      <span class="text-emerald-700 font-semibold">Checking eligibility...</span>
    </div>
  `;
  resultBox.style.display = 'block';

  // Wait 2 seconds, then show the actual result
  setTimeout(() => {
    // Only eligible countries
    const allowedCountries = [
      "Pakistan","Palestine","China","Iran","Turkey","Afghanistan","Bangladesh","Sirilanka","Oman","Spain","Egypt","Panama","Palestine State","Sri Lanka"
    ];

    let eligible = false;
    let message = "";

    if (!allowedCountries.includes(country)) {
      eligible = false;
      message = "You are not eligible: Only applicants from selected countries are eligible.";
    } else if (education === "intermediate") {
      if (percentage >= 70 && age <= 23) {
        eligible = true;
        message = "Congratulations! You are eligible for the scholarship.";
      } else {
        eligible = false;
        message = "You are not eligible: For Intermediate, percentage must be ≥ 70 and age ≤ 23.";
      }
    } else if (education === "bachelor") {
      if (percentage >= 75 && age <= 26) {
        eligible = true;
        message = "Congratulations! You are eligible for the scholarship.";
      } else {
        eligible = false;
        message = "You are not eligible: For Bachelor, percentage must be ≥ 75 and age ≤ 26.";
      }
    } else if (education === "master") {
      if (percentage >= 80 && age <= 28) {
        eligible = true;
        message = "Congratulations! You are eligible for the scholarship.";
      } else {
        eligible = false;
        message = "You are not eligible: For Master, percentage must be ≥ 80 and age ≤ 28.";
      }
    } else if (education === "phd") {
      eligible = false;
      message = "You are not eligible: Applicants with PhD as last education are not eligible.";
    } else {
      eligible = false;
      message = "Please select your education level.";
    }

    if (eligible) {
      resultBox.innerHTML = `
        <div class="border-2 border-green-500 text-green-700 bg-green-50 rounded-lg px-4 py-3 font-semibold transition flex flex-col items-center">
          <i class="fas fa-check-circle text-3xl text-green-500 mb-2"></i>
          Congratulations ${name ? name : ''}! You are eligible for the scholarship.
          <div class="mt-4 flex gap-4">
            <button id="applyBtn" class="px-4 py-2 border border-emerald-700 text-emerald-700 rounded hover:bg-emerald-700 hover:text-white transition font-bold">Apply</button>
            <button id="backBtn" class="px-4 py-2 border border-gray-400 text-gray-700 rounded hover:bg-gray-200 transition font-bold">Back</button>
          </div>
        </div>
      `;
      resultBox.style.display = 'block';

      // Apply button
      document.getElementById('applyBtn').onclick = function() {
        window.location.href = "index.html";
      };
      // Back button
      document.getElementById('backBtn').onclick = function() {
        resultBox.style.display = 'none';
        resultBox.innerHTML = '';
        document.getElementById('eligibilityForm').reset();
        const nav = document.querySelector('nav');
        if (nav) {
          nav.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
    } else {
      resultBox.innerHTML = `<div class="border-2 border-red-500 text-red-700 bg-red-50 rounded-lg px-4 py-3 font-semibold transition">${message}</div>`;
      resultBox.style.display = 'block';
      setTimeout(() => {
        resultBox.style.display = 'none';
        resultBox.innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 5000);
    }

    // Scroll slightly down toward the bottom after clicking check
    setTimeout(() => {
      window.scrollBy({ top: 250, left: 0, behavior: 'smooth' });
    }, 100);
  }, 2000); // 2 seconds loading
});

// Scroll to main nav on page load/refresh
window.addEventListener('DOMContentLoaded', function() {
  const nav = document.querySelector('nav');
  if (nav) {
    nav.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});
</script>

           class="hover:text-blue-600"> +92-344-6072989</a>
          <b>| <i class="fas fa-phone-alt"></i> Landline:</b> <a href="tel:9238-476937" class="hover:text-blue-600"> 9238-476937</a><br><br>

    <script>

            // Scroll to top button
            const scrollToTopBtn = document.getElementById('scrollToTop');
            
            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    scrollToTopBtn.classList.remove('opacity-0', 'invisible');
                    scrollToTopBtn.classList.add('opacity-100', 'visible');
                } else {
                    scrollToTopBtn.classList.add('opacity-0', 'invisible');
                    scrollToTopBtn.classList.remove('opacity-100', 'visible');
                }
            });
            
            scrollToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
// Map zoom functionality
      let mapScale = 1;
const mapImg = document.getElementById('mapImage');
document.getElementById('zoomIn').onclick = function() {
  mapScale = Math.min(mapScale + 0.2, 3);
  mapImg.style.transform = `scale(${mapScale})`;
};
document.getElementById('zoomOut').onclick = function() {
  mapScale = Math.max(mapScale - 0.2, 0.5);
  mapImg.style.transform = `scale(${mapScale})`;
};  

// Mobile zoom buttons
document.getElementById('zoomInMobile').onclick = function() {
  mapScale = Math.min(mapScale + 0.2, 3);
  mapImg.style.transform = `scale(${mapScale})`;
};
document.getElementById('zoomOutMobile').onclick = function() {
  mapScale = Math.max(mapScale - 0.2, 0.5);
  mapImg.style.transform = `scale(${mapScale})`;
};

       // Disable right-click
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
});
// Disable F12, Ctrl+Shift+I, Ctrl+U
document.addEventListener('keydown', function(e) {
    // Disable Ctrl+U
  if (e.ctrlKey && e.key.toLowerCase() === 'u') {
    e.preventDefault();
    return false;
  }
  // Disable F12
  if (e.key === "F12") {
    e.preventDefault();
    return false;
  }
  // Disable Ctrl+Shift+I
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
    e.preventDefault();
    return false;
  }
});
    </script>
